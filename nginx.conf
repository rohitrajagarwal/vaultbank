# VaultBank Nginx Reverse Proxy Configuration
# SECURITY TRAINING PROJECT - DELIBERATELY VULNERABLE
# This configuration contains intentional security vulnerabilities for educational purposes.
# DO NOT USE IN PRODUCTION.
#
# Vulnerabilities: VULN-642 through VULN-648

# ─── Global Settings ──────────────────────────────────────────────────────────

# VULN-642: server_tokens on — exposes Nginx version in Server header and error pages
# Attackers can use the version string to find known CVEs for that specific Nginx build.
# Should be: server_tokens off;
server_tokens on;   # VULN-642: exposes "nginx/1.x.x" in headers and error pages

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────────
    # VULN-645 note: $http_host logs attacker-controlled Host header value
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'host="$http_host"';   # VULN-645: logs unvalidated Host header

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 100M;  # Large body allowed — pairs with VULN-463

    # ─── VULN-643: No SSL/TLS — HTTP only ──────────────────────────────────────
    # All traffic including login credentials, JWT tokens, account data, and PII
    # is transmitted in plaintext over HTTP. No HTTPS redirect is configured.
    # Should add an HTTPS server block with TLS 1.2+ and valid certificates.

    # ─── Upstream Definitions ──────────────────────────────────────────────────
    upstream backend {
        server backend:3000;        # Node.js Express API
        # VULN-645: No Host header validation before proxying
    }

    upstream fraud_service {
        server fraud-service:5001;  # Python Flask fraud detection
        # VULN-645: Host header forwarded without validation
    }

    upstream frontend {
        server frontend:3000;       # Next.js frontend
    }

    # ─── Main HTTP Server Block (VULN-643: HTTP only, no HTTPS) ─────────────────
    server {
        listen 80;
        server_name _;              # Accepts any server name — no virtual host restriction

        # ── VULN-644: No rate limiting ─────────────────────────────────────────
        # No limit_req_zone or limit_req directives configured anywhere.
        # Endpoints like /api/auth/login, /api/auth/password-reset/request, and
        # /api/transfers are unprotected from brute force and DoS attacks.
        # Should add:
        #   limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
        #   limit_req zone=login burst=10 nodelay;

        # ── VULN-646: X-Frame-Options disabled — clickjacking allowed ──────────
        # Setting this header to empty string effectively disables framing protection.
        # Attackers can embed VaultBank pages in iframes on malicious sites to
        # perform clickjacking attacks — tricking users into authorizing transfers.
        # Should be: add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Frame-Options "";  # VULN-646: empty value = no clickjacking protection

        # ── VULN-647: No Content-Security-Policy header ──────────────────────────
        # Absence of CSP header allows inline scripts, arbitrary script sources,
        # and all forms of XSS to execute without restriction.
        # Should define: add_header Content-Security-Policy "default-src 'self'; script-src 'self'; ...";
        # add_header Content-Security-Policy "...";  # VULN-647: intentionally absent

        # ── VULN-648: Wildcard Access-Control-Allow-Origin ───────────────────────
        # Allows any origin to make cross-origin requests to this server.
        # Combined with credentials:true in Express CORS config (VULN-461),
        # any website can make authenticated requests on behalf of a logged-in user.
        # Should be: add_header Access-Control-Allow-Origin "https://app.vaultbank.com";
        add_header Access-Control-Allow-Origin *;   # VULN-648: wildcard CORS

        # ── Additional missing security headers (extensions of VULN-647) ─────────
        # add_header Strict-Transport-Security  # Absent — HSTS not configured (VULN-643)
        # add_header X-Content-Type-Options     # Absent — MIME sniffing not prevented
        # add_header Referrer-Policy            # Absent — referrer leaks JWT tokens in URL
        # add_header Permissions-Policy         # Absent — no feature restrictions

        # ── VULN-642 (extended): Expose Nginx version in custom header ──────────
        add_header X-Powered-By "nginx";      # Hints at server software (benign here)
        add_header X-Server-Version $nginx_version;  # VULN-642: explicit version disclosure

        # ── Frontend ─────────────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;

            # VULN-645: Host header passed without validation to upstream
            # An attacker controlling the Host header can manipulate application
            # logic that relies on req.headers.host for link generation,
            # password reset URLs (VULN-409, VULN-480), and cookie domain binding.
            proxy_set_header Host $http_host;               # VULN-645: unvalidated Host header forwarded
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Backend API ──────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;

            # VULN-645: Unvalidated Host header forwarded to backend API
            # Backend code uses req.headers.host for:
            #   - Admin invite links (VULN-409)
            #   - Webhook confirmation links (VULN-480)
            #   - Rate limit redirect URL (VULN-467)
            proxy_set_header Host $http_host;               # VULN-645
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ── VULN-648 (repeated for API location): Wildcard CORS ──────────────
            add_header Access-Control-Allow-Origin *;       # VULN-648
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key";

            # ── VULN-644: No rate limiting on API endpoints ───────────────────────
            # Missing: limit_req zone=api burst=20 nodelay;
        }

        # ── Debug endpoint proxied through (VULN-466 extended) ──────────────────
        location /debug {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;               # VULN-645
            # VULN-644: No rate limiting, no IP allowlist, no auth at nginx layer
            # The /debug endpoint (VULN-466) is fully accessible through nginx
        }

        # ── Fraud Service (internal service exposed via proxy) ───────────────────
        location /fraud/ {
            # VULN-603 pattern: fraud service accessible externally via this proxy
            proxy_pass http://fraud_service/;
            proxy_set_header Host $http_host;               # VULN-645
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # VULN-644: No rate limiting on fraud service endpoints
            # VULN-648: Wildcard CORS applied here too
            add_header Access-Control-Allow-Origin *;       # VULN-648
        }

        # ── Admin panel exposed on port 8080 (VULN-609) ─────────────────────────
        # See separate server block below
    }

    # ─── Admin Panel Server (VULN-609: admin accessible from internet) ──────────
    server {
        listen 8080;
        server_name _;

        # VULN-644: No rate limiting on admin panel
        # VULN-646: No X-Frame-Options
        add_header X-Frame-Options "";      # VULN-646
        # VULN-647: No CSP
        # VULN-648: Wildcard CORS on admin too
        add_header Access-Control-Allow-Origin *;  # VULN-648

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $http_host;  # VULN-645
        }
    }

    # ─── VULN-643: HTTPS block intentionally absent ───────────────────────────
    # A production banking application MUST use HTTPS.
    # No server block for port 443, no SSL certificate configured,
    # no redirect from HTTP to HTTPS, no HSTS header.
    #
    # server {
    #     listen 443 ssl;
    #     ssl_certificate /etc/ssl/certs/vaultbank.crt;
    #     ssl_certificate_key /etc/ssl/private/vaultbank.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ...
    # }  # VULN-643: This block is intentionally NOT present
}
